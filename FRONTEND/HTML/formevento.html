<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Evento - HiddenTale</title>

    <!-- Collegamento ai CSS -->
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/formevento.css">
</head>
<body>

<!-- Contenitore in cui verrà caricata la navbar -->
<div id="navbar-container"></div>

<!-- Richiamo dello script per caricare la navbar -->
<script src="../JAVASCRIPT/navbar.js"></script>

<!-- CONTENUTO PRINCIPALE -->
<main class="form-page">

    <h1 class="page-title">Form Eventi</h1>

    <!-- IL FORM VERO E PROPRIO -->
    <form action="#" method="POST" class="evento-form-container">

        <!-- COLONNA SINISTRA: Input Testuali -->
        <div class="form-left-col">

            <!-- Riga: Titolo -->
            <div class="form-row">
                <label for="titolo">Titolo:</label>
                <input type="text" id="titolo" placeholder="Inserire Titolo">
            </div>

            <!-- Riga: Luogo -->
            <div class="form-row">
                <label for="luogo">Luogo:</label>
                <input type="text" id="luogo" placeholder="Inserire Luogo">
            </div>

            <!-- Riga: Date (divisa in due) -->
            <div class="form-row split-row">
                <div class="form-field-half">
                    <label for="data-inizio">Data Inizio:</label>
                    <input type="date" id="data-inizio" required>
                </div>
                <div class="form-field-half">
                    <label for="data-fine">Data Fine:</label>
                    <input type="date" id="data-fine" required>
                </div>
            </div>

            <!-- Riga: Posti e Prezzo (divisa in due) -->
            <div class="form-row split-row">
                <div class="form-field-half">
                    <label for="posti">Posti:</label>
                    <input type="number" id="posti" placeholder="Posti disponibili" min="1">
                </div>
                <div class="form-field-half">
                    <label for="prezzo">Prezzo:</label>
                    <input type="number" id="prezzo" placeholder="Inserire prezzo (€)" step="0.50" min="0">
                </div>
            </div>

            <!-- Riga: Descrizione -->
            <div class="form-row column-row">
                <label for="descrizione" class="descrizione-label">Descrizione</label>
                <textarea id="descrizione" placeholder="Inserire descrizione" rows="6"></textarea>
            </div>

        </div>

        <!-- COLONNA DESTRA: Immagine e Bottone -->
        <div class="form-right-col">

            <!-- Box Caricamento Immagine -->
            <!-- Più avanti con JS potrete farlo cliccabile per caricare un file -->
            <div class="image-upload-box">
                <span>Inserire<br>immagine</span>
            </div>

            <!-- Bottone Submit -->
            <button type="submit" class="btn-crea">Crea Evento</button>

        </div>

    </form>

    <!-- Modale di Conferma -->
    <div id="modal-conferma" class="modal-overlay">
        <div class="modal-content">
            <h2>Evento Creato!</h2>
            <p>Il tuo evento è stato salvato con successo.</p>
            <button id="btn-conferma-modal" class="btn-crea">Torna agli eventi</button>
        </div>
    </div>

</main>

<!-- Importa prima il database statico -->
<script src="../JAVASCRIPT/dati_eventi.js"></script>

<!-- Poi importa lo script che gestisce il form -->
<script src="../JAVASCRIPT/formevento.js"></script>

</body>
</html>
