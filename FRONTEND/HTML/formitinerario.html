<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenTale - Creazione Itinerario</title>
    <!-- Collegamenti ai file CSS -->
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/formitinerario.css">
</head>
<body>

<!-- Contenitore in cui verrà caricata la navbar -->
<div id="navbar-container"></div>

<!-- Richiamo dello script per caricare la navbar -->
<script src="../JAVASCRIPT/navbar.js"></script>

    <!-- Titolo principale fuori dal main per avere la linea a tutto schermo tramite global.css -->
    <h1 class="main-title">Creazione Itinerario</h1>

    <main class="creazione-page">
        <form id="form-creazione-itinerario">
            
            <!-- Campo Titolo dell'itinerario -->
            <div class="form-row title-row">
                <label for="itinerario-titolo">Titolo:</label>
                <input type="text" id="itinerario-titolo" class="custom-input input-titolo" required>
            </div>

            <!-- Campi di Ricerca: Partenza e Arrivo -->
            <div class="form-grid-inputs">
                <div class="input-group">
                    <label>Partenza</label>
                    <div class="search-input-wrapper">
                        <!-- Manteniamo la lente bloccata a 18x18 anche nell'attributo HTML per sicurezza -->
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#633A1C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="itinerario-partenza" class="custom-input input-search" placeholder="Cerca località...">
                    </div>
                </div>

                <div class="input-group">
                    <label>Arrivo</label>
                    <div class="search-input-wrapper">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#633A1C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text"  id="itinerario-arrivo" class="custom-input input-search" placeholder="Cerca località...">
                    </div>
                </div>
            </div>

            <!-- Bottone Genera Centrale -->
            <div class="center-btn-container">
                <button type="button" class="btn-genera">Genera</button>
            </div>

            <!-- Box Itinerario Proposto (Popolato poi dal backend) -->
            <div class="proposto-container">
                <h2 class="section-subtitle">Itinerario proposto:</h2>
                <div id="itinerario-proposto-box" class="proposto-box">
                    
                    <!-- Riga Tappa Esempio per controllo visivo -->
                    <div class="tappa-item">
                        <div class="tappa-chip">Nome Luogo</div>
                        <div class="tappa-chip">Orario</div>
                        <div class="tappa-chip">Distanza</div>
                        
                        <div class="tappa-actions">
                            <!-- Bottone Matita Modifica (Verde #6E8B3D) -->
                            <button type="button" class="action-btn btn-matita" aria-label="Modifica tappa">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#6E8B3D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                </svg>
                            </button>
                            <!-- Bottone X Elimina (Rosso #C23305) -->
                            <button type="button" class="action-btn btn-elimina-tappa" aria-label="Elimina tappa">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#C23305" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Pulsanti di Azione Finali in Basso -->
            <div class="form-actions-bottom">
                <button type="reset" class="btn-final btn-reset" id="btn-reset">Reset</button>
                <button type="submit" class="btn-final btn-salva">Salva itinerario</button>
            </div>

        </form>
    </main>

    <!-- Collegamento al file JavaScript se necessario in futuro -->
    <script src="../JAVASCRIPT/creazioneitinerario.js"></script>
    <!-- Popup Salvataggio Riuscito -->
<div id="modal-successo" class="modal-overlay">
    <div class="modal-card">
        <h3>Ottimo lavoro!</h3>
        <p>L'itinerario è stato salvato correttamente.</p>
        <button type="button" id="btn-modal-ok" class="btn-final btn-salva">Vai agli itinerari</button>
    </div>
</div>
</body>
</html>
