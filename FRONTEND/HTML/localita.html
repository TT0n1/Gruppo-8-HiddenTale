<head>
    <link rel="stylesheet" href="../CSS/global.css">
        <link rel="stylesheet" href="../CSS/localita.css">
    </head>
    <body>

<main class="localita-page">
    
    
    <h1 id="localita-titolo" class="page-title">Nome Località</h1>

    <!-- BLOCCO 1: Immagine Principale + Testo Tradizione -->
    <section class="intro-section">
        <div class="main-image-wrapper">
            <img id="localita-img-principale" src="IMAGES\placeholder.jpg" alt="Immagine della località">
            <!-- mettere immagine cuore pieno quaando cliccato-->
            <button class="favorite-btn" aria-label="Aggiungi ai preferiti">
    <img src="IMAGES/cuore_vuoto.svg" alt="Icona cuore">
</button>
        </div>

        <article class="tradizione-box">
            <h2>Tradizione</h2>
            <p id="localita-descrizione"></p>
        </article>
    </section>

    <!-- BLOCCO 2: Dati Statistici + Stemma -->
    <section class="data-section">
        <div class="stats-box">
            <div class="stat-item">
                <p><strong>N° Abitanti:</strong> <span id="localita-abitanti">-</span></p>
            </div>
            <div class="stat-item">
                <p><strong>Provincia:</strong> <span id="localita-provincia">-</span></p>
            </div>
        </div>
        
        <div class="stemma-box">
            <img id="localita-stemma" src="images/placeholder-stemma.png" alt="Stemma del Comune">
        </div>
    </section>

    <!-- BLOCCO 3: Galleria Fotografica -->
    <section class="gallery-section">
        <!-- Il contenitore della griglia rimane vuoto o con immagini fittizie; 
             JS potrà svuotarlo e riempirlo con i tag img corretti della località scelta -->
        <div id="localita-galleria" class="gallery-grid">
            
            <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 1">
            <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 2">
            <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 3">
        </div>
    </section>
    
</main>
