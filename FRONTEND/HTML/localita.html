<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Località</title>

    <!-- Collegamento ai CSS (usando sempre ../ per uscire dalla cartella HTML) -->
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/localita.css">
</head>

    <body>
        <!-- Contenitore in cui verrà caricata la navbar -->
        <div id="navbar-container"></div>

        <!-- Richiamo dello script per caricare la navbar -->
        <script src="../JAVASCRIPT/navbar.js"></script>

        <h1 id="localita-titolo" class="main-title">Nome Località</h1>

        <main class="localita-page">




        <!-- BLOCCO 1: Immagine Principale + Testo Tradizione -->
        <section class="intro-section">
            <div class="main-image-wrapper">
                <img id="localita-img-principale" src="IMAGES\placeholder.jpg" alt="Immagine della località">
                <!-- mettere immagine cuore pieno quaando cliccato-->
                <button class="favorite-btn" aria-label="Aggiungi ai preferiti">
                    <img src="IMAGES/cuore_vuoto.svg" alt="Icona cuore">
                </button>
            </div>

            <article class="tradizione-box">
                <h2>Tradizione</h2>
                <p id="localita-descrizione"></p>
            </article>
        </section>

        <!-- BLOCCO 2: Dati Statistici + Stemma -->
        <section class="data-section">
            <div class="stats-box">
                <div class="stat-item">
                    <p><strong>N° Abitanti:</strong> <span id="localita-abitanti">-</span></p>
                </div>
                <div class="stat-item">
                    <p><strong>Provincia:</strong> <span id="localita-provincia">-</span></p>
                </div>
            </div>

            <div class="stemma-box">
                <img id="localita-stemma" src="images/placeholder-stemma.png" alt="Stemma del Comune">
            </div>
        </section>

        <!-- BLOCCO 3: Galleria Fotografica -->
        <section class="gallery-section">
            <!-- Il contenitore della griglia rimane vuoto o con immagini fittizie;
                 JS potrà svuotarlo e riempirlo con i tag img corretti della località scelta -->
            <div id="localita-galleria" class="gallery-grid">

                <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 1">
                <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 2">
                <img class="gallery-thumb" src="images/placeholder-thumb.jpg" alt="Foto galleria 3">
            </div>
        </section>

        </main>

        <!-- 1. Aggiungi il database finto per primo -->
        <script src="../JAVASCRIPT/dati_localita.js"></script>

        <!-- 2. Aggiungi lo script che popola la pagina leggendo l'URL -->
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const urlParams = new URLSearchParams(window.location.search);
                const idLocalita = urlParams.get("id");

                function mostraErrore() {
                    document.getElementById("localita-titolo").innerText = "Località non trovata";
                    document.getElementById("localita-descrizione").innerText = "Nessun dato disponibile per questa selezione.";
                    document.getElementById("localita-img-principale").style.display = "none";
                }

                if (!idLocalita) {
                    mostraErrore();
                    return;
                }

                let dati = null;

                // 1. Cerca nel database statico
                if (typeof databaseLocalita !== 'undefined' && databaseLocalita[idLocalita]) {
                    dati = databaseLocalita[idLocalita];
                }

                // 2. Se non la trova, cerca nella sessione (località aggiunte dall'utente)
                if (!dati) {
                    const localitaSessione = JSON.parse(sessionStorage.getItem('localitaUtente')) || [];
                    dati = localitaSessione.find(l => l.id === idLocalita);
                }

                // 3. Se la località non esiste da nessuna parte, mostra errore
                if (!dati) {
                    mostraErrore();
                    return;
                }

                // 4. Popola i testi (supporta sia le chiavi del file statico sia quelle del form custom)
                document.getElementById("localita-titolo").innerText = dati.nome || dati.titolo || "Nome non disponibile";
                document.getElementById("localita-descrizione").innerText = dati.informazione || dati.descrizione || "Nessuna descrizione disponibile.";

                // I campi abitanti e provincia non sono nel form custom, quindi mettiamo un fallback
                const abitantiElement = document.getElementById("localita-abitanti");
                if (abitantiElement) abitantiElement.innerText = dati.abitanti || "Dato non disponibile";

                const provinciaElement = document.getElementById("localita-provincia");
                if (provinciaElement) provinciaElement.innerText = dati.provincia || "Dato non disponibile";

                // 5. Inserisce le immagini
                const imgPrincipale = document.getElementById("localita-img-principale");
                if (imgPrincipale) {
                    imgPrincipale.src = dati.immagine || dati.immaginePrincipale || "../IMAGES/placeholder.jpg";
                }

                const imgStemma = document.getElementById("localita-stemma");
                if (imgStemma) {
                    imgStemma.src = dati.stemma || "../IMAGES/placeholder-stemma.png";
                }
            });
        </script>

        <!-- 3. Mantieni lo script dei preferiti per ultimo in modo che legga il titolo aggiornato -->
        <script src="../JAVASCRIPT/preferiti.js"></script>
    </body>
