<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenco degli Eventi - HiddenTale</title>

    <!-- Collegamento ai CSS -->
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/listaeventi.css">
</head>
<body>

<!-- Contenitore in cui verrà caricata la navbar -->
<div id="navbar-container"></div>

<!-- Richiamo dello script per caricare la navbar -->
<script src="../JAVASCRIPT/navbar.js"></script>

<!-- CONTENUTO PRINCIPALE -->
<main class="lista-page">

    <h1 class="main-title">Elenco degli eventi</h1>

    <!-- BARRA DI RICERCA + BOTTONE FILTRO E MENU -->
    <section class="search-filter-section">
        <div class="search-wrapper">
            <img src="./IMAGES/lente.svg" alt="Cerca" class="search-icon" width="18" height="18">
            <input type="text" id="search-bar" placeholder="Cerca una località...">
        </div>

        <div class="filter-container">
            <!-- Bottone Filtro -->
            <button id="filter-btn" class="filter-button" aria-label="Filtra eventi">
                <img src="IMAGES/iconafiltro.svg" alt="Filtri" width="28" height="28">
            </button>

            <!-- IL MENU A TENDINA -->
            <div id="popover-filtro" class="filter-popover">
                <form id="form-filtri" class="filter-options">
                    <p class="filter-title">Ordina eventi:</p>

                    <label class="filter-item">
                        <input type="radio" name="evento-filtro" value="tutti" checked>
                        <span>Tutti gli eventi</span>
                    </label>

                    <label class="filter-item">
                        <input type="radio" name="evento-filtro" value="vicini">
                        <span>Più vicini (Distanza)</span>
                    </label>

                    <label class="filter-item">
                        <input type="radio" name="evento-filtro" value="lontani">
                        <span>Più lontani (Distanza)</span>
                    </label>
                </form>
            </div>
        </div>
    </section>

    <!-- LISTA SCORREVOLE DEGLI EVENTI (Svuotata per la generazione dinamica) -->
    <section id="lista-eventi" class="scrollable-list">
        <!-- Le card verranno inserite qui dinamicamente dal JS -->
    </section>

    <!-- BOTTONE INFO IN FONDO ALLA PAGINA -->
    <section class="footer-action-section">
        <a href="formevento.html" class="info-form-btn">
            HAI UN EVENTO CHE VUOI SPONSORIZZARE?<br>
            CLICCA QUESTO BOTTONE PER ANDARE SUL FORM
        </a>
    </section>

</main>

<!-- Inserimento database eventi -->
<script src="../JAVASCRIPT/dati_eventi.js"></script>

<!-- Script per generare dinamicamente la lista degli eventi -->
<script src="../JAVASCRIPT/listaeventi.js"></script>

<script src="../JAVASCRIPT/filtri.js"></script>

</body>
</html>
