<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Località Preferita - HiddenTale</title>

  <!-- Collegamento ai CSS -->
  <link rel="stylesheet" href="../CSS/global.css">
  <link rel="stylesheet" href="../CSS/localitapreferite.css">
</head>
<body>

<!-- Contenitore in cui verrà caricata la navbar -->
<div id="navbar-container"></div>

<!-- Richiamo dello script per caricare la navbar -->
<script src="../JAVASCRIPT/navbar.js"></script>

<!-- CONTENUTO PRINCIPALE -->
<main class="lista-page">

  <!-- TITOLO PAGINA -->
  <header class="page-header">
    <h1 class="main-title">Località preferite</h1>
    <hr class="main-divider">
  </header>

  <!-- BARRA DI RICERCA + BOTTONE FILTRO -->
  <section class="search-filter-section">
    <div class="search-wrapper">
                <span class="search-icon">
                    <img src="IMAGES/search-icon.svg" alt="Cerca" width="20" height="20">
                </span>
      <input type="text" id="search-bar" placeholder="">
    </div>

    <button id="filter-btn" class="filter-button" aria-label="Filtra località">
      <img src="IMAGES/iconafiltro.svg" alt="Filtri" width="28" height="28">
    </button>
  </section>

  <!-- LISTA SCORREVOLE DELLE LOCALITÀ (Svuotata dalle card statiche) -->
  <section id="lista-localita" class="scrollable-list">
    <!-- Le card verranno inserite qui dinamicamente dal JS -->
  </section>

</main>

<!-- Inserimento database finto -->
<script src="../JAVASCRIPT/dati_localita.js"></script>

<!-- Script per generare dinamicamente solo le località salvate nei preferiti -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const listaContainer = document.getElementById("lista-localita");

    // Recupera l'array di nomi delle località salvate in preferiti.js
    const preferiti = JSON.parse(sessionStorage.getItem("localitaPreferite")) || [];

    // Se non ci sono preferiti, mostra un messaggio
    if (preferiti.length === 0) {
      listaContainer.innerHTML = "<p style='text-align: center; margin-top: 20px;'>Nessuna località aggiunta ai preferiti.</p>";
      return;
    }

    // Cicla il database e crea le card solo per i titoli presenti nell'array preferiti
    for (const [id, dati] of Object.entries(databaseLocalita)) {
      if (preferiti.includes(dati.titolo)) {
        const cardLink = document.createElement("a");
        cardLink.href = `localita.html?id=${id}`;
        cardLink.className = "localita-card";

        cardLink.innerHTML = `
              <div class="card-image-wrapper">
                <img src="${dati.immaginePrincipale}" alt="Foto di ${dati.titolo}">
              </div>
              <div class="card-info-wrapper">
                <div class="info-group">
                  <span class="info-label">Nome:</span>
                  <p class="info-value">${dati.titolo}</p>
                  <hr class="info-line">
                </div>
                <div class="info-group">
                  <span class="info-label">Descrizione:</span>
                  <p class="info-value">${dati.descrizione}</p>
                  <hr class="info-line">
                </div>
                <div class="info-group">
                  <span class="info-label">Provincia:</span>
                  <p class="info-value">${dati.provincia}</p>
                  <hr class="info-line">
                </div>
              </div>
            `;

        listaContainer.appendChild(cardLink);
      }
    }
  });
</script>
</body>
</html>
