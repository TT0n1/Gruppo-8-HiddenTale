<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index - HiddenTale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/index.css">
</head>
<body>
<div id="navbar-container"></div>
<script src="../JAVASCRIPT/navbar.js"></script>

<div class="search-container">
    <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" readonly />
    </div>
</div>

<div class="map-banner">
    <div id="map">
        <script src="../JAVASCRIPT/mappa.js"></script>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</div>

<div class="events-section">
    <h2 class="events-title">Eventi nei paraggi</h2>
    <div class="carousel-container" id="carouselContainer">
        <div class="carousel-track" id="carouselTrack">
            <!-- Verrà popolato dinamicamente dal JS -->
        </div>
    </div>
</div>

<!-- Aggiunto il collegamento al database degli eventi -->
<script src="../JAVASCRIPT/dati_eventi.js"></script>
<script src="../JAVASCRIPT/carousel.js"></script>
</body>
</html>
